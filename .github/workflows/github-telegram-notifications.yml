name: GitHub → Telegram Notifications

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
      TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
    steps:
      - name: Fetch GitHub notifications
        id: fetch
        run: |
          # Fetch unread notifications
          response=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/notifications?all=false&participating=false&per_page=50")

          echo "$response" > notifications.json
          count=$(echo "$response" | jq 'length')
          echo "count=$count" >> $GITHUB_OUTPUT

          if [ "$count" -gt 0 ]; then
            echo "has_notifications=true" >> $GITHUB_OUTPUT
          else
            echo "has_notifications=false" >> $GITHUB_OUTPUT
          fi

      - name: Format and send notifications
        if: steps.fetch.outputs.has_notifications == 'true'
        run: |
          # Read notifications and format as single message
          message=$(jq -r '
            .[] |
            "🔔 *GitHub Notifications*\n" +
            "📦 *Repo:* \(.repository.full_name)\n" +
            "📋 *Type:* \(.subject.type)\n" +
            "📝 *Title:* \(.subject.title)\n" +
            "🔗 *URL:* \(.subject.url | sub("api\\.github\\.com/repos"; "github.com") | sub("/pulls/"; "/pull/") | sub("/issues/"; "/issues/"))\n" +
            "⏰ *Updated:* \(.updated_at)\n" +
            "---\n"
          ' notifications.json)

          # Send as single message (Telegram limit: 4096 chars)
          curl -s -X POST "https://api.telegram.org/bot$TG_BOT_TOKEN/sendMessage" \
            -d chat_id="$TG_CHAT_ID" \
            -d parse_mode="Markdown" \
            -d text="$message" > /dev/null

      - name: Mark notifications as done (optional)
        if: steps.fetch.outputs.has_notifications == 'true'
        run: |
          # Mark only the fetched notifications as done
          jq -r '.[].id' notifications.json | while read -r id; do
            curl -s -X PATCH -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/notifications/threads/$id" \
              -d '{"read":true}' > /dev/null
          done